<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Keno VIP</title>
</head>
<body>

<!-- LOGIN -->
<div id="loginBox">
  <h2>🔒 Keno VIP</h2>
  <input id="email" placeholder="Email"><br><br>
  <input id="password" type="password" placeholder="Password"><br><br>
  <button id="loginBtn">Đăng nhập</button>
</div>

<!-- KENO -->
<div id="kenoContent" style="display:none;">
  <h3 id="info"></h3>
  <table id="board" border="1"></table>
</div>

<script type="module">
// ===== FIREBASE =====
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCkYL3cFQb2seMm1BRX9HTpnQ1JRrUFkaE",
  authDomain: "keno3979.firebaseapp.com",
  projectId: "keno3979",
  storageBucket: "keno3979.firebasestorage.app",
  messagingSenderId: "793948728871",
  appId: "1:793948728871:web:fa0b728f8f72e10a9fa802",
  measurementId: "G-Q0DH0F6XE8"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// ===== LOGIN =====
document.getElementById("loginBtn").addEventListener("click", async () => {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try {
    await signInWithEmailAndPassword(auth, email, password);
    alert("Đăng nhập thành công");
  } catch (e) {
    alert("Sai tài khoản hoặc mật khẩu");
    console.error(e);
  }
});

// ===== RENDER KENO =====
function render(){
  const tb = document.getElementById("board");
  tb.innerHTML = "";
  let n = 1;

  for(let r=0;r<8;r++){
    let tr=document.createElement("tr");
    for(let c=0;c<10;c++){
      let td=document.createElement("td");
      td.textContent = n.toString().padStart(2,"0");
      tr.appendChild(td);
      n++;
    }
    tb.appendChild(tr);
  }

  document.getElementById("info").innerText = "Đã login thành công 🎉";
}

// ===== CHECK LOGIN =====
onAuthStateChanged(auth, (user) => {
  const loginBox = document.getElementById("loginBox");
  const kenoContent = document.getElementById("kenoContent");

  if (user) {
    loginBox.style.display = "none";
    kenoContent.style.display = "block";
    render();
  } else {
    loginBox.style.display = "block";
    kenoContent.style.display = "none";
  }
});
</script>

</body>
</html>
